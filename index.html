<!DOCTYPE html>
<html>
<head>
    <title>BiasCheck.io | Inclusive Hiring Intelligence</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        header h1 {
            font-size: 42px;
            margin: 0;
        }

        header p {
            color: #cfd8dc;
            margin-top: 10px;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            margin-bottom: 60px;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 15px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            outline: none;
            resize: none;
        }

        select, button {
            margin-top: 15px;
            padding: 12px 20px;
            font-size: 15px;
            border-radius: 8px;
            border: none;
        }

        select {
            margin-right: 10px;
        }

        button {
            background: #00c6ff;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #00a3cc;
        }

        .score-section {
            margin-top: 25px;
        }

        .progress {
            height: 18px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #00ffcc;
            width: 0%;
            transition: 0.6s ease;
        }

        .bias-card {
            background: rgba(255,255,255,0.15);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .badge {
            background: #00ffcc;
            color: black;
            padding: 4px 8px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 10px;
        }

        .comparison {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .box {
            flex: 1;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            white-space: pre-wrap;
        }

        .highlight {
            background: #ff4d4d;
            padding: 2px 4px;
            border-radius: 4px;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #90a4ae;
            font-size: 13px;
        }

        @media(max-width: 768px) {
            .comparison {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>BiasCheck.io</h1>
    <p>Inclusive Hiring Intelligence Platform</p>
</header>

<div class="container">

    <textarea id="textInput" placeholder="Paste your job description here..."></textarea>

    <br>
    <select id="modeSelect">
        <option>Global Neutral</option>
        <option>US EEOC Mode</option>
        <option>Indian Diversity Mode</option>
    </select>

    <button onclick="analyzeText()">Analyze & Improve</button>

    <div id="results"></div>

</div>

<footer>
    © 2026 BiasCheck.io | AI for Ethical Hiring
</footer>

<script>
async function analyzeText() {

    const text = document.getElementById("textInput").value;
    const mode = document.getElementById("modeSelect").value;

    const response = await fetch("http://127.0.0.1:8000/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ text: text, mode: mode })
    });

    const data = await response.json();

    let biasHTML = "";
    let categoryCount = {};

    data.detected_bias.forEach(item => {

        categoryCount[item.category] = 
            (categoryCount[item.category] || 0) + 1;

        biasHTML += `
            <div class="bias-card">
                <strong>${item.biased_term}</strong> → ${item.suggestion}
                <span class="badge">${item.category}</span>
            </div>
        `;
    });

    let highlightedText = text;
    data.detected_bias.forEach(item => {
        const regex = new RegExp(item.biased_term, "gi");
        highlightedText = highlightedText.replace(
            regex,
            `<span class="highlight">${item.biased_term}</span>`
        );
    });

    let categorySummary = "";
    for (const cat in categoryCount) {
        categorySummary += `<p>${cat}: ${categoryCount[cat]} detected</p>`;
    }

    document.getElementById("results").innerHTML = `
        <div class="score-section">
            <h3>Bias Score: ${data.bias_score}/100</h3>
            <div class="progress">
                <div class="progress-bar" style="width:${data.bias_score}%"></div>
            </div>
        </div>

        <h3>Bias Breakdown</h3>
        ${categorySummary || "No bias detected 🎉"}

        <h3>Detected Bias Terms</h3>
        ${biasHTML || "Clean & Inclusive 🎉"}

        <div class="comparison">
            <div class="box">
                <strong>Original Text</strong><br><br>
                ${highlightedText}
            </div>

            <div class="box">
                <strong>Inclusive Optimized Version</strong><br><br>
                ${data.auto_fixed_text}
            </div>
        </div>
    `;
}
</script>

</body>
</html>
